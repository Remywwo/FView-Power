name: Update download links on release

on:
  workflow_run:
    workflows: ["Release FView Power"]
    types: [completed]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Update download links in docs
        run: |
          set -e
          TAG=$(gh release list --repo "${{ github.repository }}" --limit 1 --json tagName --jq '.[0].tagName')
          REPO="${{ github.repository }}"

          # Fetch asset names from the release
          ASSETS=$(gh release view "$TAG" --repo "$REPO" --json assets \
            --jq '.assets[].name' 2>/dev/null || echo "")

          if [ -z "$ASSETS" ]; then
            echo "No assets found for $TAG, skipping."
            exit 0
          fi

          # Pick one artifact per platform (landing page has 3 buttons)
          MAC=$(echo "$ASSETS" | grep -E '\.dmg$' | head -1)
          WIN=$(echo "$ASSETS" | grep -E '\-setup\.(exe|msi)$' | head -1)
          DEB=$(echo "$ASSETS" | grep -E '\.deb$' | head -1)

          DL_BASE="https://github.com/$REPO/releases/download/$TAG"
          MAC_URL="${MAC:+$DL_BASE/$MAC}"
          WIN_URL="${WIN:+$DL_BASE/$WIN}"
          DEB_URL="${DEB:+$DL_BASE/$DEB}"

          echo "Resolved assets:"
          echo "  macOS : ${MAC:-none}"
          echo "  Windows: ${WIN:-none}"
          echo "  Linux : ${DEB:-none}"

          FILE="docs/index.html"

          # Use Python (not sed) to update each platform's href. Sed range-based
          # editing kept overstepping into the next <a class="dl"> block, which
          # is how Linux silently lost its .deb URL several releases in a row.
          # The Python rewrite matches each block by its i18n key and replaces
          # the href in-place; it is unambiguous and side-effect-free.
          MAC_URL="$MAC_URL" WIN_URL="$WIN_URL" DEB_URL="$DEB_URL" python3 - "$FILE" <<'PY'
import os
import re
import sys

docs_file = sys.argv[1]
mac_url = os.environ.get("MAC_URL") or ""
win_url = os.environ.get("WIN_URL") or ""
deb_url = os.environ.get("DEB_URL") or ""

URLS = {
    "download.mac": mac_url,
    "download.win": win_url,
    "download.lin": deb_url,
}

with open(docs_file, encoding="utf-8") as f:
    content = f.read()

def replace_block(match):
    block = match.group(0)
    name = re.search(r'data-i18n="(download\.(mac|win|lin))"', block)
    if not name:
        return block
    url = URLS.get(name.group(1))
    if not url:
        return block  # no asset for this platform; leave block alone
    return re.sub(r'href="[^"]+"', f'href="{url}"', block, count=1)

new_content = re.sub(
    r'<a [^>]*class="dl"[^>]*>.*?</a>',
    replace_block,
    content,
    flags=re.DOTALL,
)

if new_content != content:
    with open(docs_file, "w", encoding="utf-8") as f:
        f.write(new_content)
    for key, url in URLS.items():
        if url:
            print(f"✓ {key}: {url.rsplit('/', 1)[-1]}")
else:
    print("No changes needed.")
PY

      - name: Commit and push
        run: |
          if git diff --quiet docs/index.html; then
            echo "No changes to commit."
            exit 0
          fi

          # Final guard: verify each platform section's href extension matches
          # the i18n key, so any future regression is caught before push.
          python3 - "$FILE" <<'PY'
import re, sys
EXPECTED = {"download.mac": ".dmg", "download.win": ".exe", "download.lin": ".deb"}
with open(sys.argv[1], encoding="utf-8") as f:
    content = f.read()
blocks = re.findall(r'<a [^>]*class="dl"[^>]*>.*?</a>', content, re.DOTALL)
errors = 0
for block in blocks:
    name = re.search(r'data-i18n="(download\.(mac|win|lin))"', block)
    href = re.search(r'href="([^"]+)"', block)
    if not (name and href):
        continue
    ext = EXPECTED[name.group(1)]
    if not href.group(1).lower().endswith(ext):
        print(f"ERROR: {name.group(1)} href ends with '{href.group(1).rsplit('.',1)[-1]}' but expected '{ext}': {href.group(1)}", file=sys.stderr)
        errors += 1
    else:
        print(f"OK   {name.group(1)}: {href.group(1).rsplit('/', 1)[-1]}")
sys.exit(1 if errors else 0)
PY
          if [ $? -ne 0 ]; then
            echo "✗ Platform link validation failed; refusing to push." >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git commit -m "docs: auto-update download links to latest release"
          git push
